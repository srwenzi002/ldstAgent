  start_row: 10
  max_rows: 3
  row_stride: 12
  fields:
    expense_date:
      column: A
    purpose:
      column: J
      allowed_values:
        - 交際費
        - 会議費
        - 旅費交通費
        - 通信費
        - 消耗品費
