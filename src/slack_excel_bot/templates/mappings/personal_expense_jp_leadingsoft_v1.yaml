template_id: personal_expense_jp_leadingsoft_v1
sheet: 経費（個人）精算書
missing_strategy:
  default: error
single_fields:
  - field_path: employee.department
    cell: J5
    allowed_values:
      - 取締役会
      - 営業部
      - 管理部
      - 開発本部
      - ソリューション開発部
      - プラットフォーム開発部
      - カスタマサポートエンジニアリング部
  - field_path: employee.employee_id
    cell: N5
  - field_path: employee.name
    cell: R5
