name: CD

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          TAG_SHA="$(git rev-list -n 1 "$GITHUB_REF")"
          MAIN_SHA="$(git rev-parse origin/main)"
          if ! git merge-base --is-ancestor "$TAG_SHA" "$MAIN_SHA"; then
            echo "Tag ${GITHUB_REF} is not reachable from origin/main"
            exit 1
          fi

      - name: Create release archive
        run: |
          git archive --format=tar.gz --output release.tar.gz "$GITHUB_SHA"

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment assets
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "sudo mkdir -p /opt/slack-excel-bot/source && sudo chown -R $DEPLOY_USER:$DEPLOY_USER /opt/slack-excel-bot"
          scp -i ~/.ssh/deploy_key deploy/docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:/opt/slack-excel-bot/docker-compose.prod.yml"
          scp -i ~/.ssh/deploy_key deploy/deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:/opt/slack-excel-bot/deploy.sh"
          scp -i ~/.ssh/deploy_key release.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/opt/slack-excel-bot/release.tar.gz"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "chmod +x /opt/slack-excel-bot/deploy.sh"

      - name: Upload server env file
        run: |
          cat > server.env <<'EOF'
          ${{ secrets.SERVER_ENV_FILE }}
          EOF
          scp -i ~/.ssh/deploy_key server.env "$DEPLOY_USER@$DEPLOY_HOST:/opt/slack-excel-bot/.env"

      - name: Deploy to wen-zi.com
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail; rm -rf /opt/slack-excel-bot/source/*; tar -xzf /opt/slack-excel-bot/release.tar.gz -C /opt/slack-excel-bot/source; docker build -t slack-excel-bot:${GITHUB_REF_NAME} /opt/slack-excel-bot/source; export IMAGE_URI='slack-excel-bot:${GITHUB_REF_NAME}' IMAGE_TAG='${GITHUB_REF_NAME}' GITHUB_SHA='${GITHUB_SHA}' GITHUB_REF='${GITHUB_REF}'; /opt/slack-excel-bot/deploy.sh"
